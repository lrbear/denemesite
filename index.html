<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLEAN Ultimate</title>

    <!-- AOS Animasyon -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Matrix Arkaplan -->
    <canvas id="matrix"></canvas>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">TLEAN</div>

        <ul class="nav-links">
            <li><a href="#home">Ana Sayfa</a></li>
            <li><a href="#games">Oyunlar</a></li>
            <li><a href="#projects">Projeler</a></li>
            <li><a href="#contact">İletişim</a></li>
        </ul>

        <button id="theme-toggle">🎨 Tema</button>
    </nav>

    <!-- Hero Bölümü -->
    <section id="home" class="hero">
        <div class="hero-content" data-aos="fade-up">
            <h1 class="glitch" data-text="TLEAN">
                TLEAN
            </h1>

            <p id="typing-text">
                SYSTEM ONLINE...
            </p>

            <a href="#games" class="hero-btn">
                🚀 Keşfet
            </a>
        </div>
    </section>

    <!-- Oyunlar -->
    <section id="games">

        <h2 data-aos="fade-right">
            🎮 Oyun Merkezleri
        </h2>

        <div class="game-grid">

            <div class="game-card roblox"
                 data-aos="zoom-in">
                <h3>🎮 Roblox</h3>

                <p>
                    Roblox projeleri ve içerikleri.
                </p>
            </div>

            <div class="game-card valorant"
                 data-aos="zoom-in"
                 data-aos-delay="100">

                <h3>🔴 Valorant</h3>

                <p>
                    FPS optimizasyonları ve rehberler.
                </p>
            </div>

            <div class="game-card pubg"
                 data-aos="zoom-in"
                 data-aos-delay="200">

                <h3>🟡 PUBG Mobile</h3>

                <p>
                    Hassasiyet ayarları ve ipuçları.
                </p>
            </div>

            <div class="game-card brawl"
                 data-aos="zoom-in"
                 data-aos-delay="300">

                <h3>🟣 Brawl Stars</h3>

                <p>
                    Kupa hedefleri ve stratejiler.
                </p>
            </div>

        </div>

    </section>
